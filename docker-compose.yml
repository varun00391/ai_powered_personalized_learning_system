services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnos
      POSTGRES_PASSWORD: learnos
      POSTGRES_DB: learnos
    volumes:
      - learnos_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnos -d learnos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://learnos:learnos@db:5432/learnos
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-use-long-random-string}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://localhost
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  learnos_pg:
